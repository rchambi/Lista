<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Player with Dynamic Buttons</title>
    <link href="https://vjs.zencdn.net" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .video-container { margin: 20px auto; max-width: 800px; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        .button-group { margin-top: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { 
            padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px;
            background-color: #007bff; color: white; transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        .active-btn { background-color: #28a745 !important; }
    </style>
</head>
<body>

    <h1>Stream Player</h1>

    <div class="video-container">
        <video id="my-video" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">To view this video please enable JavaScript.</p>
        </video>
    </div>

    <h3>Select a Channel:</h3>
    <div class="button-group">
        <!-- Add your M3U8 links here -->
        <button onclick="loadVideo('https://rcntv-rcnmas-1-us.plex.wurl.tv/playlist.m3u8', this)">CARACOL 1</button>
        <button onclick="loadVideo('https://sample-url.com', this)">Channel 2</button>
        <button onclick="loadVideo('https://sample-url.com', this)">Channel 3</button>
    </div>

    <script src="https://vjs.zencdn.net"></script>

    <script>
        const player = videojs('my-video');

        // Function to change the video source
        function loadVideo(url, btnElement) {
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();

            // Visual feedback: highlight active button
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active-btn'));
            if(btnElement) btnElement.classList.add('active-btn');
        }

        // Auto-load from URL parameter if present (?url=...)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const initialUrl = urlParams.get('url');
            if (initialUrl) {
                loadVideo(initialUrl);
            }
        };
    </script>
</body>
</html>
