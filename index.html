<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor con Autoplay</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; }
        iframe { border: none; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h1>Reproductor Automático</h1>

    <div>
        <button onclick="reproducir('SF06Qy1Ct6Y')">Reproducir Video 1</button>
        <button onclick="reproducir('cb12KmMMDJA')">Reproducir Video 2</button>
    </div>

    <!-- El reproductor vacío al inicio o con el primer video -->
    <iframe id="visor" width="640" height="360" 
            src="" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
    </iframe>

    <script>
        function reproducir(idVideo) {
            // Se añaden los parámetros autoplay=1 y mute=1 para asegurar que funcione
            const urlFinal = "https://www.youtube.com" + idVideo + "?autoplay=1&mute=1";
            document.getElementById('visor').src = urlFinal;
        }
    </script>

</body>
</html>
