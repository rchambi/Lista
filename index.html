<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <title>Reproductor con Menú Desplegable</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Estilos del Menú */
        .controls { margin-bottom: 25px; text-align: left; }
        
        .categoria-padre {
            background-color: #333; color: white; width: 100%; text-align: left;
            padding: 15px; margin-top: 5px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 1.1em; position: relative;
        }
        .categoria-padre:after { content: ' ▼'; font-size: 0.8em; float: right; }

        /* Contenedor de hijos oculto por defecto */
        .hijos-container {
            display: none; background: #e9e9ed; padding: 10px; border-radius: 0 0 6px 6px;
            margin-bottom: 10px;
        }

        /* Botones de canales (hijos) */
        button.canal { 
            padding: 10px 18px; margin: 5px; cursor: pointer; border-radius: 4px; 
            border: none; background-color: #555; color: white; font-weight: bold; transition: 0.3s;
        }
        button.canal:hover { background-color: #777; }
        button.canal.active { background-color: #64bb50; box-shadow: 0 0 8px rgba(100, 187, 80, 0.6); }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            
            <!-- Grupo Argentina -->
            <button class="categoria-padre" onclick="toggleMenu('grupo-arg')">🇦🇷 Canales Argentina</button>
            <div id="grupo-arg" class="hijos-container">
            <button class="canal active" onclick="reproducir('SF06Qy1Ct6Y', this, 'yt')">▶ C5N</button>
            <button class="canal"  onclick="reproducir('cb12KmMMDJA', this, 'yt')">▶ TN</button>
            <button class="canal"  onclick="reproducir('rwnz1KIHTh8', this, 'yt')">▶ Canal 26</button> 
            <button class="canal"  onclick="reproducir('JC7f3EUDaqw', this, 'yt')">▶ Cronica</button>
            <button class="canal"  onclick="reproducir('M_gUd2Bp9g0', this, 'yt')">▶ LN+</button>
            <button class="canal"  onclick="reproducir('ArKbAx1K-2U', this, 'yt')">▶ A24</button>            
            <button class="canal"  onclick="reproducir('JrmCaXL5GZs', this, 'yt')">▶ Ar|12</button>
            </div>

            <!-- Grupo Bolivia -->
            <button class="categoria-padre" onclick="toggleMenu('grupo-bol')">🇧🇴 Canales Bolivia</button>
            <div id="grupo-bol" class="hijos-container">
            <button class="canal" onclick="reproducir('x9n2qyk', this, 'dm')">▶ Red uno SCZ</button>
            <button class="canal" onclick="reproducir('x9mmebq', this, 'dm')">▶ Red uno LP</button>
            <button class="canal" onclick="reproducir('x9nzqpo', this, 'dm')">▶ Bolivia tv 1</button>
            <button class="canal" onclick="reproducir('x9ny70y', this, 'dm')">▶ Bolivia tv 2</button>
            <button class="canal" onclick="reproducir('x84eirw', this, 'dm')">ATB</button>

            <!-- <button class="canal" onclick="reproducir('ElgCFOkyrjU', this, 'yt')">▶ FBOP1</button>
            <button class="canal" onclick="reproducir('Jq6xSusx6aA', this, 'yt')">▶ FBOP2</button>
            <button class="canal" onclick="reproducir('pJ06l0haUM8', this, 'yt')">▶ FBOP2</button>
            <button class="canal" onclick="reproducir('DsUr9IorEHc', this, 'yt')">▶ FBOP3</button>
            <button class="canal" onclick="reproducir('1l9cS9Vgd_k', this, 'yt')">▶ FBOP4</button>                 -->
             </div>

            <button class="categoria-padre" onclick="toggleMenu('grupo-cable')">Vivo</button>
            <div id="grupo-cable" class="hijos-container">
                <button class="canal" onclick="reproducir('//190.238.43.117:8000/play/a09d/index.m3u8', this, 'm3u')">▶ Dgo</button>
                <button onclick="loadChannel('http://190.238.43.117:8000/play/a09d/index.m3u8')">Canal 1</button>
            </div>

        </div>

        <div class="video-wrapper">
            <iframe id="visor" src="https://www.youtube.com/embed/SF06Qy1Ct6Y" allowfullscreen allow="autoplay"></iframe>
        </div>

        <video id="video2" controls></video>

    </div>

    <script>

    var video = document.getElementById('video2');
    var hls = new Hls();

    function loadChannel(url) {
        if (Hls.isSupported()) {
            hls.destroy(); // Cerramos el canal anterior antes de cargar el nuevo
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Soporte nativo (Safari)
            video.src = url;
            video.play();
        }
    }


        // Función para abrir/cerrar los menús
        function toggleMenu(id) {
            const menu = document.getElementById(id);
            const estaAbierto = menu.style.display === "block";
            
            // Cerrar todos los demás primero (opcional)
            document.querySelectorAll('.hijos-container').forEach(c => c.style.display = "none");
            
            // Si no estaba abierto, lo abrimos
            if (!estaAbierto) {
                menu.style.display = "block";
            }
        }

        // Función para reproducir
        function reproducir(idVideo, elemento, plataforma) {
            let urlFinal = "";
            if (plataforma === 'dm') {
                urlFinal = "https://www.dailymotion.com/embed/video/" + idVideo + "?autoplay=1";
            } else if (plataforma === 'yt'){
                urlFinal = "https://www.youtube.com/embed/" + idVideo + "?autoplay=1";
            }else
            {
                urlFinal = "http:" +idVideo; 
            }


            document.getElementById('visor').src = urlFinal;

            // Manejo de clase activa en todos los botones de clase "canal"
            document.querySelectorAll('.canal').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
        }
    </script>

</body>
</html>
