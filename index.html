<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Reproductor M3U8</title>

    <!-- CORRECCIÓN 1: Cargamos la librería AQUÍ, antes que nada -->
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; background: black; border-radius: 8px; }
        .playlist { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <video id="video" controls></video>

    <div class="playlist">
        <button onclick="loadChannel('http://181.78.71.71')">Canal Prueba</button>
        <button onclick="loadChannel('http://181.78.71.71:18000/play/a03p/index.m3u8')">Canal Prueba</button>
    </div>

    <script>
        // CORRECCIÓN 2: Declaramos la variable pero NO la iniciamos hasta que se use
        var hls; 
        var video = document.getElementById('video');

        function loadChannel(url) {
            // Verificamos si la librería cargó correctamente
            if (typeof Hls === 'undefined') {
                alert("La librería Hls.js no ha cargado. Revisa tu conexión a internet.");
                return;
            }

            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); } // Limpiar si ya había uno abierto
                
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }
    </script>
</body>
</html>
